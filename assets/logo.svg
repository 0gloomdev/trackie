<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="orbGlow" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:rgba(139, 92, 246,0.4)"/>
      <stop offset="50%" style="stop-color:rgba(34, 211, 238,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(6, 14, 32,0.95)"/>
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer glow ring -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="url(#textGradient)" stroke-width="2" opacity="0.6"/>
  
  <!-- Glass sphere -->
  <circle cx="60" cy="60" r="45" fill="url(#orbGlow)" stroke="rgba(139, 92, 246,0.4)" stroke-width="1.5" filter="url(#glow)"/>
  
  <!-- Inner highlight -->
  <ellipse cx="48" cy="48" rx="15" ry="10" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Letter T -->
  <text x="60" y="78" font-family="Arial Black, sans-serif" font-size="45" font-weight="900" fill="url(#textGradient)" text-anchor="middle">T</text>
</svg>
