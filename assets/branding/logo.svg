<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <radialGradient id="orbGlow" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:rgba(139, 92, 246,0.4)"/>
      <stop offset="50%" style="stop-color:rgba(34, 211, 238,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(6, 14, 32,0.95)"/>
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(139, 92, 246,0.6)"/>
      <stop offset="100%" style="stop-color:rgba(34, 211, 238,0.6)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="#060E20"/>
  
  <!-- Outer glow ring -->
  <circle cx="150" cy="150" r="120" fill="none" stroke="url(#ringGradient)" stroke-width="2" opacity="0.6"/>
  
  <!-- Central glass sphere -->
  <circle cx="150" cy="150" r="95" fill="url(#orbGlow)" stroke="rgba(139, 92, 246,0.4)" stroke-width="1.5" filter="url(#glow)"/>
  
  <!-- Inner highlight -->
  <ellipse cx="130" cy="130" rx="30" ry="20" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Letter T -->
  <text x="150" y="175" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="url(#textGradient)" text-anchor="middle">T</text>
  
  <!-- Orbiting particles -->
  <circle cx="250" cy="150" r="6" fill="#8B5CF6" opacity="0.8" filter="url(#glow)"/>
  <circle cx="150" cy="50" r="5" fill="#22D3EE" opacity="0.8" filter="url(#glow)"/>
  <circle cx="50" cy="150" r="4" fill="#8B5CF6" opacity="0.6" filter="url(#glow)"/>
  <circle cx="150" cy="250" r="5" fill="#22D3EE" opacity="0.6" filter="url(#glow)"/>
</svg>
