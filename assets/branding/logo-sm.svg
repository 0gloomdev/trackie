<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <radialGradient id="orbGlow" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:rgba(139, 92, 246,0.4)"/>
      <stop offset="50%" style="stop-color:rgba(34, 211, 238,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(6, 14, 32,0.95)"/>
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="60" height="60" fill="#060E20" rx="12"/>
  
  <!-- Outer ring -->
  <circle cx="30" cy="30" r="24" fill="none" stroke="url(#textGradient)" stroke-width="1" opacity="0.6"/>
  
  <!-- Glass sphere -->
  <circle cx="30" cy="30" r="18" fill="url(#orbGlow)" stroke="rgba(139, 92, 246,0.4)" stroke-width="1"/>
  
  <!-- Inner highlight -->
  <ellipse cx="25" cy="25" rx="6" ry="4" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Letter T -->
  <text x="30" y="36" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="url(#textGradient)" text-anchor="middle">T</text>
</svg>
