<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f2a"/>
      <stop offset="100%" style="stop-color:#060E20"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(139, 92, 246,0.3)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGradient)"/>
  
  <!-- Corner glows -->
  <ellipse cx="0" cy="0" rx="150" ry="120" fill="url(#orb1)" opacity="0.4"/>
  <ellipse cx="800" cy="200" rx="180" ry="140" fill="url(#orb1)" opacity="0.3"/>
  
  <!-- Logo -->
  <g transform="translate(120, 100)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#textGradient)" stroke-width="1.5" opacity="0.6"/>
    <!-- Glass sphere -->
    <circle cx="0" cy="0" r="40" fill="url(#orb1)" stroke="rgba(139, 92, 246,0.4)" stroke-width="1"/>
    <!-- Letter T -->
    <text x="0" y="15" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="url(#textGradient)" text-anchor="middle">T</text>
  </g>
  
  <!-- Vertical separator -->
  <line x1="200" y1="40" x2="200" y2="160" stroke="rgba(139, 92, 246,0.5)" stroke-width="1"/>
  
  <!-- Title -->
  <text x="230" y="95" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="url(#textGradient)">Trackie</text>
  
  <!-- Subtitle -->
  <text x="230" y="130" font-family="Arial, sans-serif" font-size="16" fill="rgba(226,232,240,0.7)" font-weight="300">Futuristic link tracking with glassmorphism</text>
  
  <!-- Badges -->
  <g transform="translate(230, 145)">
    <rect x="0" y="0" width="55" height="22" rx="11" fill="rgba(139, 92, 246,0.15)" stroke="rgba(139, 92, 246,0.3)" stroke-width="1"/>
    <text x="28" y="15" font-family="Arial, sans-serif" font-size="11" fill="rgba(226,232,240,0.8)" text-anchor="middle">Star</text>
  </g>
  
  <g transform="translate(295, 145)">
    <rect x="0" y="0" width="55" height="22" rx="11" fill="rgba(34, 211, 238,0.15)" stroke="rgba(34, 211, 238,0.3)" stroke-width="1"/>
    <text x="28" y="15" font-family="Arial, sans-serif" font-size="11" fill="rgba(226,232,240,0.8)" text-anchor="middle">Fork</text>
  </g>
</svg>
