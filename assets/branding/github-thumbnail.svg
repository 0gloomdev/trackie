<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="80%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#060E20"/>
    </radialGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(139, 92, 246,0.4)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(34, 211, 238,0.4)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGradient)"/>
  
  <!-- Nebula effects -->
  <ellipse cx="200" cy="200" rx="300" ry="250" fill="url(#orb1)" opacity="0.5"/>
  <ellipse cx="1080" cy="440" rx="350" ry="280" fill="url(#orb2)" opacity="0.5"/>
  
  <!-- Decorative circles -->
  <circle cx="1180" cy="80" r="60" fill="none" stroke="rgba(139, 92, 246,0.2)" stroke-width="2"/>
  <circle cx="100" cy="560" r="45" fill="none" stroke="rgba(34, 211, 238,0.2)" stroke-width="2"/>
  
  <!-- Logo container -->
  <g transform="translate(640, 320)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#textGradient)" stroke-width="2" opacity="0.6"/>
    
    <!-- Glass sphere -->
    <circle cx="0" cy="0" r="85" fill="url(#orb1)" stroke="rgba(139, 92, 246,0.4)" stroke-width="1.5" filter="url(#glow)"/>
    
    <!-- Inner highlight -->
    <ellipse cx="-15" cy="-20" rx="25" ry="15" fill="rgba(255,255,255,0.08)"/>
    
    <!-- Letter T -->
    <text x="0" y="25" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="url(#textGradient)" text-anchor="middle">T</text>
  </g>
  
  <!-- Orbiting particles around logo -->
  <circle cx="520" cy="320" r="5" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="760" cy="320" r="5" fill="#22D3EE" opacity="0.8"/>
  <circle cx="640" cy="200" r="4" fill="#8B5CF6" opacity="0.6"/>
  <circle cx="640" cy="440" r="4" fill="#22D3EE" opacity="0.6"/>
  
  <!-- Title -->
  <text x="640" y="480" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="url(#textGradient)" text-anchor="middle">Trackie</text>
  
  <!-- Subtitle -->
  <text x="640" y="530" font-family="Arial, sans-serif" font-size="24" fill="rgba(226,232,240,0.7)" text-anchor="middle" font-weight="300">Track Everything, Everywhere</text>
  
  <!-- Feature badges -->
  <g transform="translate(340, 580)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="rgba(139, 92, 246,0.1)" stroke="rgba(139, 92, 246,0.3)" stroke-width="1"/>
    <text x="70" y="23" font-family="Arial, sans-serif" font-size="14" fill="rgba(226,232,240,0.8)" text-anchor="middle">Futuristic UI</text>
  </g>
  
  <g transform="translate(510, 580)">
    <rect x="0" y="0" width="130" height="36" rx="18" fill="rgba(34, 211, 238,0.1)" stroke="rgba(34, 211, 238,0.3)" stroke-width="1"/>
    <text x="65" y="23" font-family="Arial, sans-serif" font-size="14" fill="rgba(226,232,240,0.8)" text-anchor="middle">URL Metadata</text>
  </g>
  
  <g transform="translate(670, 580)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="rgba(139, 92, 246,0.1)" stroke="rgba(139, 92, 246,0.3)" stroke-width="1"/>
    <text x="60" y="23" font-family="Arial, sans-serif" font-size="14" fill="rgba(226,232,240,0.8)" text-anchor="middle">Analytics</text>
  </g>
</svg>
